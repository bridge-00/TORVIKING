name: Torrent to VikingFile Uploader

on:
  workflow_dispatch:
    inputs:
      torrent_link:
        description: "Magnet link or .torrent URL"
        required: true
      viking_user_hash:
        required: false
      viking_folder:
        required: false
      telegram_chat_id:
        required: false

jobs:
  upload:
    runs-on: windows-latest

    steps:
      - name: Install aria2
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest https://github.com/aria2/aria2/releases/download/release-1.37.0/aria2-1.37.0-win-64bit-build1.zip -OutFile aria2.zip
          Expand-Archive aria2.zip -DestinationPath .
          Move-Item aria2-1.37.0-win-64bit-build1 aria2

      - name: Prepare environment
        shell: pwsh
        run: |
          echo "PYTHONIOENCODING=utf-8" >> $env:GITHUB_ENV
          New-Item -ItemType Directory -Path downloads -Force

      - name: Download torrent
        shell: pwsh
        run: |
          $link = "${{ github.event.inputs.torrent_link }}"

          Write-Host "━━━━━━━━━━━━━━━━━━━━"
          Write-Host "📥 DOWNLOADING"
          Write-Host "━━━━━━━━━━━━━━━━━━━━"

          .\aria2\aria2c.exe `
            --dir=downloads `
            --seed-time=0 `
            --enable-dht=true `
            --bt-enable-lpd=true `
            --max-connection-per-server=16 `
            --split=16 `
            $link

          if ($LASTEXITCODE -ne 0) {
            Write-Host "❌ Download failed"
            exit 1
          }

          Write-Host "✅ Download complete"

      - name: Upload to VikingFile + Telegram
        shell: pwsh
        run: |
          $userHash = "${{ github.event.inputs.viking_user_hash }}"
          $folder   = "${{ github.event.inputs.viking_folder }}"
          $chatId   = "${{ github.event.inputs.telegram_chat_id }}"

          # ✅ FIXED ARRAY
          $uploadedLinks = @()

          Write-Host "━━━━━━━━━━━━━━━━━━━━"
          Write-Host "📤 UPLOADING"
          Write-Host "━━━━━━━━━━━━━━━━━━━━"

          # Download uploader
          Invoke-WebRequest https://raw.githubusercontent.com/Hexdare/VikingFile-Upload/main/upload.py -OutFile upload.py

          $files = Get-ChildItem downloads -Recurse -File | Where-Object { $_.Extension -ne ".aria2" }

          foreach ($f in $files) {
            Write-Host ""
            Write-Host "📄 Uploading: $($f.Name)"

            $args = @($f.FullName)
            if ($userHash) { $args += $userHash }
            if ($folder)   { $args += $folder }

            $output = python upload.py @args 2>&1 | Out-String

            # 🔍 PRINT OUTPUT FOR DEBUG
            Write-Host "---- UPLOADER OUTPUT ----"
            Write-Host $output
            Write-Host "-------------------------"

            if ($LASTEXITCODE -ne 0) {
              Write-Host "❌ Upload failed"
              exit 1
            }

            # 🔥 STRONG LINK DETECTION
            $lines = $output -split "`n"
            $found = $false

            foreach ($line in $lines) {
              if ($line -match 'https?://') {
                $link = $line.Trim()
                $uploadedLinks += "🔗 $($f.Name): $link"
                Write-Host "✅ Found link: $link"
                $found = $true
                break
              }
            }

            if (-not $found) {
              Write-Host "⚠️ No link detected for this file"
            }
          }

          Write-Host ""
          Write-Host "━━━━━━━━━━━━━━━━━━━━"
          Write-Host "📊 SUMMARY"
          Write-Host "━━━━━━━━━━━━━━━━━━━━"
          Write-Host "Links found: $($uploadedLinks.Count)"
          Write-Host "ChatID: $chatId"

          # 📩 TELEGRAM (ALWAYS SEND)
          if ($chatId) {
            $botToken = "${{ secrets.TELEGRAM_BOT_TOKEN }}"

            if ($uploadedLinks.Count -eq 0) {
              $msg = "⚠️ Upload finished but NO link detected.\nCheck GitHub logs."
            } else {
              $msg = "⚔️ TORVIKING COMPLETE!`n`n" + ($uploadedLinks -join "`n")
            }

            Invoke-RestMethod `
              -Uri "https://api.telegram.org/bot$botToken/sendMessage" `
              -Method Post `
              -ContentType "application/json" `
              -Body (ConvertTo-Json @{
                chat_id = $chatId
                text = $msg
              })

            Write-Host "📨 Telegram sent"
          } else {
            Write-Host "⚠️ No Telegram chat ID provided"
          }
