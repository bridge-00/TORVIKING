on:
  workflow_dispatch:
    inputs:
      torrent_link:
        description: "Magnet link or direct .torrent URL"
        required: true
        type: string
      viking_user_hash:
        description: "Your VikingFile user hash (leave empty for anonymous)"
        required: false
        type: string
      viking_folder:
        description: "Folder on VikingFile (optional)"
        required: false
        type: string
      telegram_chat_id:          # ← NEW
        description: "Telegram chat ID (auto-filled by bot)"
        required: false
        type: string

# ... steps 1-6 stay 100% the same ...

      - name: 7. Upload files to VikingFile + Send Telegram result
        shell: pwsh
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $userHash = "${{ github.event.inputs.viking_user_hash }}"
          $folder   = "${{ github.event.inputs.viking_folder }}"
          $chatId   = "${{ github.event.inputs.telegram_chat_id }}"

          # ... (your original upload loop stays exactly the same until the end) ...

          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          Write-Host "  🎉 ALL UPLOADS COMPLETE!"
          Write-Host "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if ($uploadedLinks.Count -gt 0) {
            Write-Host ""
            Write-Host "  📋 DOWNLOAD LINKS:"
            foreach ($entry in $uploadedLinks) { Write-Host $entry }

            # === NEW: Send beautiful message to Telegram ===
            if ($chatId) {
              $botToken = "${{ secrets.TELEGRAM_BOT_TOKEN }}"
              $torrent  = "${{ github.event.inputs.torrent_link }}"
              $msg = "⚔️ *TORVIKING UPLOAD COMPLETE!*`n`n" +
                     "📥 Torrent: $torrent`n" +
                     "📦 Files: $totalFiles | ${totalSizeMB} MB`n`n" +
                     "🔗 *Download links:*`n" +
                     ($uploadedLinks -join "`n")

              Invoke-RestMethod -Uri "https://api.telegram.org/bot$botToken/sendMessage" `
                -Method Post `
                -ContentType "application/json" `
                -Body (ConvertTo-Json @{
                  chat_id    = $chatId
                  text       = $msg
                  parse_mode = "Markdown"
                })
              Write-Host "📨 Telegram notification sent"
            }
          }
